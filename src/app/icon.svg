<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#080e1e"/>

  <!-- Magnifying glass circle -->
  <circle cx="13" cy="13" r="7.5" fill="#0d1629" stroke="#607998" stroke-width="2"/>

  <!-- Question mark -->
  <text
    x="13" y="18"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="13"
    font-weight="bold"
    fill="#f78166"
  >?</text>

  <!-- Handle -->
  <line x1="19" y1="19" x2="27" y2="27" stroke="#f78166" stroke-width="3" stroke-linecap="round"/>
</svg>
